<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">NO2 Zonal Statistics by Land Cover Change</title>
  <desc id="desc">Clustered bar chart showing mean, minimum, and maximum NO2 values for stable, gain, and loss land cover change zones. Bars start from the zero baseline.</desc>
  <rect width="960" height="540" fill="#ffffff"/>
  <text x="480" y="42" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#555555">NO2 Zonal Statistics by Land Cover Change</text>

  <g font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#444444">
    <line x1="96" y1="70" x2="910" y2="70" stroke="#d9dee3" stroke-width="1"/>
    <line x1="96" y1="117.5" x2="910" y2="117.5" stroke="#222222" stroke-width="2"/>
    <line x1="96" y1="165" x2="910" y2="165" stroke="#d9dee3" stroke-width="1"/>
    <line x1="96" y1="212.5" x2="910" y2="212.5" stroke="#d9dee3" stroke-width="1"/>
    <line x1="96" y1="260" x2="910" y2="260" stroke="#d9dee3" stroke-width="1"/>
    <line x1="96" y1="307.5" x2="910" y2="307.5" stroke="#d9dee3" stroke-width="1"/>
    <line x1="96" y1="355" x2="910" y2="355" stroke="#d9dee3" stroke-width="1"/>
    <line x1="96" y1="402.5" x2="910" y2="402.5" stroke="#d9dee3" stroke-width="1"/>
    <line x1="96" y1="450" x2="910" y2="450" stroke="#d9dee3" stroke-width="1"/>

    <text x="76" y="74" text-anchor="end">2.00</text>
    <text x="76" y="121.5" text-anchor="end">0.00</text>
    <text x="76" y="169" text-anchor="end">-2.00</text>
    <text x="76" y="216.5" text-anchor="end">-4.00</text>
    <text x="76" y="264" text-anchor="end">-6.00</text>
    <text x="76" y="311.5" text-anchor="end">-8.00</text>
    <text x="76" y="359" text-anchor="end">-10.00</text>
    <text x="76" y="406.5" text-anchor="end">-12.00</text>
    <text x="76" y="454" text-anchor="end">-14.00</text>
  </g>

  <line x1="96" y1="70" x2="96" y2="450" stroke="#b7c0c8" stroke-width="1"/>

  <g font-family="Arial, Helvetica, sans-serif" font-size="12" text-anchor="middle">
    <rect x="174" y="117.5" width="42" height="45.6" fill="#ed7d31"/>
    <text x="195" y="178" fill="#333333">-1.92</text>
    <rect x="226" y="117.5" width="42" height="276.69" fill="#a5a5a5"/>
    <text x="247" y="410" fill="#333333">-11.65</text>
    <rect x="278" y="86.39" width="42" height="31.11" fill="#ffc000"/>
    <text x="299" y="78" fill="#333333">1.31</text>
    <text x="247" y="486" fill="#333333" font-size="14">Stable</text>

    <rect x="414" y="117.5" width="42" height="45.36" fill="#ed7d31"/>
    <text x="435" y="178" fill="#333333">-1.91</text>
    <rect x="466" y="117.5" width="42" height="276.69" fill="#a5a5a5"/>
    <text x="487" y="410" fill="#333333">-11.65</text>
    <rect x="518" y="86.39" width="42" height="31.11" fill="#ffc000"/>
    <text x="539" y="78" fill="#333333">1.31</text>
    <text x="487" y="486" fill="#333333" font-size="14">Gain</text>

    <rect x="654" y="117.5" width="42" height="39.66" fill="#ed7d31"/>
    <text x="675" y="172" fill="#333333">-1.67</text>
    <rect x="706" y="117.5" width="42" height="276.69" fill="#a5a5a5"/>
    <text x="727" y="410" fill="#333333">-11.65</text>
    <rect x="758" y="86.39" width="42" height="31.11" fill="#ffc000"/>
    <text x="779" y="78" fill="#333333">1.31</text>
    <text x="727" y="486" fill="#333333" font-size="14">Loss</text>
  </g>

  <g font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#333333">
    <rect x="351" y="512" width="14" height="14" fill="#ed7d31"/>
    <text x="372" y="524">Mean</text>
    <rect x="442" y="512" width="14" height="14" fill="#a5a5a5"/>
    <text x="463" y="524">Min</text>
    <rect x="513" y="512" width="14" height="14" fill="#ffc000"/>
    <text x="534" y="524">Max</text>
  </g>
</svg>
