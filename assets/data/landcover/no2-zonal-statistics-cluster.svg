<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">NO2 Zonal Statistics by Land Cover Change</title>
  <desc id="desc">Clustered bar chart showing mean, minimum, and maximum NO2 values for stable, gain, and loss land cover change zones.</desc>
  <rect width="960" height="540" fill="#ffffff"/>
  <text x="480" y="42" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#222222">NO2 Zonal Statistics by Land Cover Change</text>

  <g font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#444444">
    <line x1="92" y1="446" x2="910" y2="446" stroke="#d8dee5" stroke-width="1"/>
    <line x1="92" y1="392" x2="910" y2="392" stroke="#edf0f4" stroke-width="1"/>
    <line x1="92" y1="338" x2="910" y2="338" stroke="#edf0f4" stroke-width="1"/>
    <line x1="92" y1="283" x2="910" y2="283" stroke="#edf0f4" stroke-width="1"/>
    <line x1="92" y1="229" x2="910" y2="229" stroke="#edf0f4" stroke-width="1"/>
    <line x1="92" y1="175" x2="910" y2="175" stroke="#edf0f4" stroke-width="1"/>
    <line x1="92" y1="120" x2="910" y2="120" stroke="#222222" stroke-width="2"/>
    <line x1="92" y1="66" x2="910" y2="66" stroke="#edf0f4" stroke-width="1"/>

    <text x="75" y="450" text-anchor="end">-12</text>
    <text x="75" y="396" text-anchor="end">-10</text>
    <text x="75" y="342" text-anchor="end">-8</text>
    <text x="75" y="287" text-anchor="end">-6</text>
    <text x="75" y="233" text-anchor="end">-4</text>
    <text x="75" y="179" text-anchor="end">-2</text>
    <text x="75" y="124" text-anchor="end">0</text>
    <text x="75" y="70" text-anchor="end">2</text>
  </g>

  <line x1="92" y1="66" x2="92" y2="446" stroke="#8d99a6" stroke-width="1.5"/>
  <line x1="92" y1="120" x2="910" y2="120" stroke="#222222" stroke-width="2"/>

  <g font-family="Arial, Helvetica, sans-serif" font-size="12" text-anchor="middle">
    <rect x="174" y="172" width="34" height="52" fill="#1f5f8b"/>
    <text x="191" y="168" fill="#1f5f8b">-1.92</text>
    <rect x="218" y="120" width="34" height="317" fill="#ed7d31"/>
    <text x="235" y="453" fill="#ed7d31">-11.65</text>
    <rect x="262" y="84" width="34" height="36" fill="#238a36"/>
    <text x="279" y="80" fill="#238a36">1.31</text>
    <text x="235" y="490" fill="#333333" font-size="14">Stable</text>

    <rect x="414" y="172" width="34" height="52" fill="#1f5f8b"/>
    <text x="431" y="168" fill="#1f5f8b">-1.91</text>
    <rect x="458" y="120" width="34" height="317" fill="#ed7d31"/>
    <text x="475" y="453" fill="#ed7d31">-11.65</text>
    <rect x="502" y="84" width="34" height="36" fill="#238a36"/>
    <text x="519" y="80" fill="#238a36">1.31</text>
    <text x="475" y="490" fill="#333333" font-size="14">Gain</text>

    <rect x="654" y="166" width="34" height="46" fill="#1f5f8b"/>
    <text x="671" y="162" fill="#1f5f8b">-1.67</text>
    <rect x="698" y="120" width="34" height="317" fill="#ed7d31"/>
    <text x="715" y="453" fill="#ed7d31">-11.65</text>
    <rect x="742" y="84" width="34" height="36" fill="#238a36"/>
    <text x="759" y="80" fill="#238a36">1.31</text>
    <text x="715" y="490" fill="#333333" font-size="14">Loss</text>
  </g>

  <g font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#333333">
    <rect x="351" y="512" width="14" height="14" fill="#1f5f8b"/>
    <text x="372" y="524">Mean</text>
    <rect x="442" y="512" width="14" height="14" fill="#ed7d31"/>
    <text x="463" y="524">Min</text>
    <rect x="513" y="512" width="14" height="14" fill="#238a36"/>
    <text x="534" y="524">Max</text>
  </g>
</svg>
